<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 — SafeStore AI</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root {
    --bg: #0E1116;
    --bg2: #161B22;
    --card: #1C232E;
    --border: #2A3340;
    --text: #E6EDF3;
    --text2: #9AA4B2;
    --text3: #6B7480;
    --primary: #3DD9D6;
    --primary-dark: #2BC4C1;
    --danger: #FF3B30;
    --danger-bg: #2B1517;
    --warn: #FFB020;
    --success: #22C55E;
    --success-bg: #0F2419;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
  }

  /* 헤더 */
  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header__brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header__icon {
    width: 28px;
    height: 28px;
    color: var(--primary);
  }
  .header__title {
    font-size: 18px;
    font-weight: 700;
  }
  .header__sub {
    font-size: 12px;
    color: var(--text2);
    margin-left: 8px;
  }
  .header__actions {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header__user {
    font-size: 13px;
    color: var(--text2);
  }
  .header__btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.15s;
    font-family: inherit;
  }
  .header__btn:hover {
    background: rgba(61, 217, 214, 0.1);
    border-color: var(--primary);
    color: var(--primary);
  }

  /* 컨테이너 */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px;
  }

  /* 섹션 */
  .section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .section__head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .section__title {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section__badge {
    background: var(--primary);
    color: var(--bg);
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .section__refresh {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .section__refresh:hover {
    color: var(--primary);
    border-color: var(--primary);
  }

  /* 테이블 */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th {
    text-align: left;
    padding: 10px 12px;
    background: var(--bg);
    color: var(--text2);
    font-weight: 500;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tr:last-child td {
    border-bottom: none;
  }
  tr:hover td {
    background: rgba(61, 217, 214, 0.03);
  }

  /* 역할 배지 */
  .role-badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .role-admin {
    background: rgba(61, 217, 214, 0.15);
    color: var(--primary);
  }
  .role-user {
    background: rgba(255, 255, 255, 0.08);
    color: var(--text);
  }
  .role-pending {
    background: rgba(255, 176, 32, 0.15);
    color: var(--warn);
  }

  /* 액션 버튼 */
  .btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    margin-right: 4px;
    transition: all 0.15s;
    font-family: inherit;
  }
  .btn:hover { background: rgba(255,255,255,0.05); }
  .btn-approve {
    background: var(--success-bg);
    border-color: rgba(34, 197, 94, 0.3);
    color: #4ADE80;
  }
  .btn-approve:hover {
    background: var(--success);
    color: white;
  }
  .btn-reject {
    background: var(--danger-bg);
    border-color: rgba(255, 59, 48, 0.3);
    color: #FF8B82;
  }
  .btn-reject:hover {
    background: var(--danger);
    color: white;
  }

  /* select */
  .role-select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }

  /* 빈 상태 */
  .empty {
    text-align: center;
    color: var(--text3);
    font-size: 13px;
    padding: 32px;
  }

  /* 알림 */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--card);
    border: 1px solid var(--border);
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 13px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    z-index: 1000;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }
  .toast.success { border-color: var(--success); color: #4ADE80; }
  .toast.error { border-color: var(--danger); color: #FF8B82; }

  /* 모바일 */
  @media (max-width: 640px) {
    .container { padding: 16px; }
    .section { padding: 16px; }
    table { font-size: 12px; }
    th, td { padding: 8px 6px; }
    .header__sub { display: none; }
    .header__user { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header__brand">
    <svg class="header__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2 L4 6 V12 C4 17 7.5 21 12 22 C16.5 21 20 17 20 12 V6 L12 2 Z"/>
      <polyline points="7.5 12 10 16 13 10 15 13 17 11"/>
    </svg>
    <span class="header__title">SafeStore AI</span>
    <span class="header__sub">관리자 페이지</span>
  </div>
  <div class="header__actions">
    <span class="header__user" id="currentUser">--</span>
    <a class="header__btn" href="/">대시보드</a>
    <button class="header__btn" onclick="logout()">로그아웃</button>
  </div>
</div>

<div class="container">

  <!-- 가입 신청 대기 -->
  <div class="section">
    <div class="section__head">
      <div class="section__title">
        가입 신청 대기
        <span class="section__badge" id="pendingCount">0</span>
      </div>
      <button class="section__refresh" onclick="loadPending()">새로고침</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>이메일</th>
          <th>신청 시각</th>
          <th>작업</th>
        </tr>
      </thead>
      <tbody id="pendingTbody">
        <tr><td colspan="3" class="empty">불러오는 중...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- 전체 사용자 -->
  <div class="section">
    <div class="section__head">
      <div class="section__title">
        전체 사용자
        <span class="section__badge" id="usersCount">0</span>
      </div>
      <button class="section__refresh" onclick="loadUsers()">새로고침</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>이메일</th>
          <th>권한</th>
          <th>가입일</th>
          <th>승인일</th>
          <th>작업</th>
        </tr>
      </thead>
      <tbody id="usersTbody">
        <tr><td colspan="5" class="empty">불러오는 중...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- 접속 로그 -->
  <div class="section">
    <div class="section__head">
      <div class="section__title">
        최근 접속 로그
        <span class="section__badge" id="logsCount">0</span>
      </div>
      <button class="section__refresh" onclick="loadLogs()">새로고침</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>이메일</th>
          <th>액션</th>
          <th>IP</th>
          <th>시각</th>
        </tr>
      </thead>
      <tbody id="logsTbody">
        <tr><td colspan="4" class="empty">불러오는 중...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<!-- 토스트 -->
<div id="toast" class="toast"></div>

<script>
// ============================================================
// 설정
// ============================================================
const SUPABASE_URL  = 'https://qazlmymqkzlgqrptjjxk.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhemxteW1xa3psZ3FycHRqanhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMjUyNjIsImV4cCI6MjA5MDYwMTI2Mn0.RcjTa9rWImbadoBH56bg3G1Zopwixz4exVCqh1u6D00';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

let accessToken = null;

// ============================================================
// 인증 체크 (admin만 접근 가능)
// ============================================================
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    window.location.href = '/login';
    return;
  }

  accessToken = session.access_token;

  try {
    const res = await fetch('/api/auth/me', {
      headers: { 'Authorization': `Bearer ${accessToken}` }
    });

    if (!res.ok) {
      await sb.auth.signOut();
      window.location.href = '/login';
      return;
    }

    const me = await res.json();

    if (me.role !== 'admin') {
      alert('관리자 권한이 필요합니다.');
      window.location.href = '/';
      return;
    }

    document.getElementById('currentUser').textContent = `👤 ${me.email}`;

    // 모든 데이터 로드
    loadPending();
    loadUsers();
    loadLogs();

  } catch (e) {
    console.error(e);
    window.location.href = '/login';
  }
})();

// ============================================================
// 가입 신청자 목록
// ============================================================
async function loadPending() {
  const tbody = document.getElementById('pendingTbody');
  tbody.innerHTML = '<tr><td colspan="3" class="empty">불러오는 중...</td></tr>';

  try {
    const res = await fetch('/api/admin/pending-users', {
      headers: { 'Authorization': `Bearer ${accessToken}` }
    });
    const data = await res.json();

    document.getElementById('pendingCount').textContent = data.count || 0;

    if (!data.users || data.users.length === 0) {
      tbody.innerHTML = '<tr><td colspan="3" class="empty">가입 신청자가 없습니다.</td></tr>';
      return;
    }

    tbody.innerHTML = data.users.map(u => `
      <tr>
        <td>${escapeHtml(u.email)}</td>
        <td>${formatDate(u.created_at)}</td>
        <td>
          <button class="btn btn-approve" onclick="approveUser('${u.id}', '${escapeHtml(u.email)}')">승인</button>
          <button class="btn btn-reject" onclick="rejectUser('${u.id}', '${escapeHtml(u.email)}')">거부</button>
        </td>
      </tr>
    `).join('');
  } catch (e) {
    tbody.innerHTML = '<tr><td colspan="3" class="empty">오류: ' + e.message + '</td></tr>';
  }
}

// ============================================================
// 전체 사용자 목록
// ============================================================
async function loadUsers() {
  const tbody = document.getElementById('usersTbody');
  tbody.innerHTML = '<tr><td colspan="5" class="empty">불러오는 중...</td></tr>';

  try {
    const res = await fetch('/api/admin/users', {
      headers: { 'Authorization': `Bearer ${accessToken}` }
    });
    const data = await res.json();

    document.getElementById('usersCount').textContent = data.count || 0;

    if (!data.users || data.users.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">사용자가 없습니다.</td></tr>';
      return;
    }

    tbody.innerHTML = data.users.map(u => `
      <tr>
        <td>${escapeHtml(u.email)}</td>
        <td><span class="role-badge role-${u.role}">${roleLabel(u.role)}</span></td>
        <td>${formatDate(u.created_at)}</td>
        <td>${u.approved_at ? formatDate(u.approved_at) : '-'}</td>
        <td>
          <select class="role-select" onchange="changeRole('${u.id}', this.value, '${escapeHtml(u.email)}')">
            <option value="">변경...</option>
            <option value="user">일반 사용자</option>
            <option value="admin">관리자</option>
            <option value="pending">대기</option>
          </select>
        </td>
      </tr>
    `).join('');
  } catch (e) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">오류: ' + e.message + '</td></tr>';
  }
}

// ============================================================
// 접속 로그
// ============================================================
async function loadLogs() {
  const tbody = document.getElementById('logsTbody');
  tbody.innerHTML = '<tr><td colspan="4" class="empty">불러오는 중...</td></tr>';

  try {
    const res = await fetch('/api/admin/access-logs?limit=50', {
      headers: { 'Authorization': `Bearer ${accessToken}` }
    });
    const data = await res.json();

    document.getElementById('logsCount').textContent = data.count || 0;

    if (!data.logs || data.logs.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty">로그가 없습니다.</td></tr>';
      return;
    }

    tbody.innerHTML = data.logs.map(l => `
      <tr>
        <td>${escapeHtml(l.email || '-')}</td>
        <td><span class="role-badge role-user">${escapeHtml(l.action)}</span></td>
        <td>${escapeHtml(l.ip_address || '-')}</td>
        <td>${formatDate(l.created_at)}</td>
      </tr>
    `).join('');
  } catch (e) {
    tbody.innerHTML = '<tr><td colspan="4" class="empty">오류: ' + e.message + '</td></tr>';
  }
}

// ============================================================
// 승인 / 거부
// ============================================================
async function approveUser(id, email) {
  if (!confirm(`${email}을(를) 승인하시겠습니까?`)) return;

  try {
    const res = await fetch(`/api/admin/approve-user/${id}`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${accessToken}` }
    });
    const data = await res.json();

    if (data.success) {
      showToast('승인 완료', 'success');
      loadPending();
      loadUsers();
    } else {
      showToast('승인 실패: ' + (data.detail || data.message), 'error');
    }
  } catch (e) {
    showToast('오류: ' + e.message, 'error');
  }
}

async function rejectUser(id, email) {
  if (!confirm(`${email}을(를) 거부하시겠습니까?\n계정이 삭제됩니다.`)) return;

  try {
    const res = await fetch(`/api/admin/reject-user/${id}`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${accessToken}` }
    });
    const data = await res.json();

    if (data.success) {
      showToast('거부 완료', 'success');
      loadPending();
      loadUsers();
    } else {
      showToast('거부 실패: ' + (data.detail || data.message), 'error');
    }
  } catch (e) {
    showToast('오류: ' + e.message, 'error');
  }
}

// ============================================================
// 권한 변경
// ============================================================
async function changeRole(id, newRole, email) {
  if (!newRole) return;

  if (!confirm(`${email}의 권한을 "${roleLabel(newRole)}"으로 변경하시겠습니까?`)) {
    loadUsers();  // 셀렉트 초기화
    return;
  }

  try {
    const res = await fetch(`/api/admin/change-role/${id}`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${accessToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ role: newRole })
    });
    const data = await res.json();

    if (data.success) {
      showToast('권한 변경 완료', 'success');
      loadUsers();
    } else {
      showToast('변경 실패: ' + (data.detail || data.message), 'error');
      loadUsers();
    }
  } catch (e) {
    showToast('오류: ' + e.message, 'error');
    loadUsers();
  }
}

// ============================================================
// 로그아웃
// ============================================================
async function logout() {
  if (!confirm('로그아웃하시겠습니까?')) return;

  fetch('/api/auth/log-access', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${accessToken}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ action: 'logout' })
  }).catch(() => {});

  await sb.auth.signOut();
  window.location.href = '/login';
}

// ============================================================
// 유틸
// ============================================================
function formatDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const hh = String(d.getHours()).padStart(2, '0');
  const min = String(d.getMinutes()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd} ${hh}:${min}`;
}

function roleLabel(role) {
  return { admin: '관리자', user: '사용자', pending: '대기' }[role] || role;
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  setTimeout(() => {
    el.className = 'toast';
  }, 3000);
}
</script>

</body>
</html>
